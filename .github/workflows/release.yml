name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Verify tag matches manifest and package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(jq -r .version public/manifest.json)
          PKG=$(jq -r .version package.json)
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest version ($MANIFEST). Run 'npm version' to keep them in sync."
            exit 1
          fi
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version ($PKG)."
            exit 1
          fi

      - run: npm run typecheck

      - run: npm run package

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "miyo-capture-${GITHUB_REF_NAME#v}-chrome.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
